<svg xmlns="http://www.w3.org/2000/svg" width="64" height="72" viewBox="0 0 100 112" fill="none">
  <defs>
    <linearGradient id="shield" x1="0" y1="0" x2="100" y2="112" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1E3A5F"/>
      <stop offset="60%" stop-color="#1B3A6B"/>
      <stop offset="100%" stop-color="#0F2240"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <linearGradient id="rim" x1="0" y1="0" x2="100" y2="112" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#60A5FA"/>
      <stop offset="50%" stop-color="#22D3EE"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
  </defs>
  <!-- Shield body -->
  <path d="M 50 2 L 90 16 L 90 60 C 90 84, 72 100, 50 110 C 28 100, 10 84, 10 60 L 10 16 Z"
        fill="url(#shield)" stroke="url(#rim)" stroke-width="2"/>
  <!-- Top-left QR finder -->
  <rect x="23" y="28" width="18" height="18" rx="2" fill="none" stroke="url(#accent)" stroke-width="2"/>
  <rect x="27" y="32" width="10" height="10" rx="1" fill="url(#accent)"/>
  <!-- Top-right QR finder -->
  <rect x="59" y="28" width="18" height="18" rx="2" fill="none" stroke="url(#accent)" stroke-width="2"/>
  <rect x="63" y="32" width="10" height="10" rx="1" fill="url(#accent)"/>
  <!-- Bottom-left QR finder -->
  <rect x="23" y="55" width="18" height="18" rx="2" fill="none" stroke="url(#accent)" stroke-width="2"/>
  <rect x="27" y="59" width="10" height="10" rx="1" fill="url(#accent)"/>
  <!-- Data dots -->
  <rect x="59" y="55" width="5" height="5" rx="1" fill="#22D3EE"/>
  <rect x="67" y="55" width="5" height="5" rx="1" fill="#22D3EE"/>
  <rect x="59" y="62" width="5" height="5" rx="1" fill="url(#accent)"/>
  <rect x="64" y="68" width="9" height="5" rx="1" fill="#22D3EE"/>
  <!-- Car silhouette -->
  <g transform="translate(50,88)">
    <path d="M -18 0 L -16 -8 L -8 -12 L 8 -12 L 16 -8 L 18 0 Z" fill="url(#accent)" opacity="0.95"/>
    <path d="M -10 -8 L -7 -14 L 7 -14 L 10 -8 Z" fill="#22D3EE" opacity="0.9"/>
    <circle cx="-11" cy="1" r="4" fill="#0F2240" stroke="url(#rim)" stroke-width="1.5"/>
    <circle cx="11"  cy="1" r="4" fill="#0F2240" stroke="url(#rim)" stroke-width="1.5"/>
    <circle cx="-11" cy="1" r="1.5" fill="url(#accent)"/>
    <circle cx="11"  cy="1" r="1.5" fill="url(#accent)"/>
  </g>
  <!-- Top accent bar -->
  <rect x="30" y="14" width="40" height="2.5" rx="1.25" fill="url(#accent)" opacity="0.5"/>
</svg>